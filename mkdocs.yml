site_name: nufftacf
site_url: https://jecampagne.github.io/nufftacf/
site_description: >
  Fast ACF estimation for irregularly- and regularly-sampled 1D signals,
  via the Non-Uniform FFT (FINUFFT) and classic FFT.
site_author: Jean-Eric Campagne
repo_url: https://github.com/jecampagne/nufftacf
repo_name: jecampagne/nufftacf
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            heading_level: 2

markdown_extensions:
  - pymdownx.snippets:
      base_path: .        # --8<-- paths resolved from repo root
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - API Reference: api.md
  - License: license.md
