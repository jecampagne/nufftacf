name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # macos-latest pointe aujourd'hui vers des runners Apple Silicon (arm64).
        # Numba et FINUFFT fournissent tous deux des wheels précompilées pour
        # arm64/x86_64 sur ces versions de Python, donc pas de compilation requise.
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + deps de test
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest -v tests/

  # Job optionnel : ajoute une couverture explicite macOS Intel (x86_64),
  # en plus du arm64 testé ci-dessus via macos-latest.
  test-macos-intel:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtual environment
        run: python -m venv venv

      - name: Activate virtual environment
        run: source venv/bin/activate
        shell: bash

      - name: Upgrade pip, setuptools, wheel
        run: pip install --upgrade pip setuptools wheel

      # Essaie d'abord les wheels binaires
      - name: Install binary wheels for critical packages
        run: |
          pip install --only-binary=:all: finufft numba llvmlite || true
        # Le "|| true" permet de continuer même si l'installation échoue

      # Installe OpenMP et LLVM (au cas où les wheels n'existent pas)
      - name: Install OpenMP and LLVM
        if: failure()  # Seulement si l'étape précédente a échoué
        run: |
          brew update
          brew install libomp llvm

      # Configure l'environnement pour LLVM et OpenMP
      - name: Set LLVM and OpenMP environment
        if: failure()  # Seulement si nécessaire
        run: |
          echo "LLVM_CONFIG=$(brew --prefix llvm)/bin/llvm-config" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$(brew --prefix llvm)" >> $GITHUB_ENV
          echo "OPENMP_ROOT=$(brew --prefix libomp)" >> $GITHUB_ENV

      # Installe le package (avec ou sans wheels)
      - name: Install package with extras
        run: pip install -e ".[benchmark,test]"
        env:
          CFLAGS: "-I$(brew --prefix libomp)/include"
          CXXFLAGS: "-I$(brew --prefix libomp)/include"
          LDFLAGS: "-L$(brew --prefix libomp)/lib -lomp"

      - name: Run tests
        run: pytest -v tests/