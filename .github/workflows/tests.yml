name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # macos-latest pointe aujourd'hui vers des runners Apple Silicon (arm64).
        # Numba et FINUFFT fournissent tous deux des wheels précompilées pour
        # arm64/x86_64 sur ces versions de Python, donc pas de compilation requise.
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + deps de test
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest -v tests/

  # Job optionnel : ajoute une couverture explicite macOS Intel (x86_64),
  # en plus du arm64 testé ci-dessus via macos-latest.
  test-macos-intel:
    runs-on: macos-15-intel
    steps:
       - uses: actions/checkout@v4
       - uses: actions/setup-python@v5
         with:
           python-version: "3.12"
       - run: pip install -e ".[test]"
       - run: pytest -v tests/
