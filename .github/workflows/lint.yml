name: Lint (Black)

on:
  push:
  pull_request:

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install black
        run: pip install black==24.2.0

      - name: Check formatting with Black
        run: black --check --diff .
